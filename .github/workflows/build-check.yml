name: Build check

on:
  pull_request:
    branches: [main, "redesign/**"]

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installer (no publish)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: electron/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            electron/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install electron deps
        shell: pwsh
        working-directory: electron
        run: pnpm install --frozen-lockfile

      - name: Install frontend deps
        shell: pwsh
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend contract tests (SC-12)
        shell: pwsh
        working-directory: frontend
        run: pnpm test

      - name: Build installer
        shell: pwsh
        working-directory: electron
        run: pnpm run build:all
